name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'
          go-version-file: 'api/go.mod'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install Playwright dependencies
        run: |
          npm install -g @playwright/test
          npx playwright install --with-deps

      - name: Start docker-compose stack
        run: |
          docker compose up -d --wait

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to be healthy..."
          timeout 120s bash -c 'until docker compose ps | grep -q "healthy"; do sleep 2; done'
          docker compose ps

      - name: Run Go quality gates
        working-directory: ./api
        env:
          MONGODB_URI: mongodb://localhost:27017/flagdeck_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
        run: |
          # Go vet
          echo "Running go vet..."
          go vet ./...

          # Go test
          echo "Running go test..."
          go test -v ./...

          # Go build
          echo "Running go build..."
          go build -o bin/server ./cmd/server
          go build -o bin/seed ./cmd/seed

          # Go fmt check
          echo "Checking go fmt..."
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "gofmt check failed. Please run 'go fmt ./...' to fix formatting issues:"
            gofmt -l .
            exit 1
          fi
          echo "gofmt check passed"

      - name: Run web quality gates
        working-directory: ./web
        run: |
          # npm ci
          echo "Running npm ci..."
          npm ci

          # npm run lint
          echo "Running npm run lint..."
          npm run lint

          # npm run build
          echo "Running npm run build..."
          npm run build

      - name: Run Playwright E2E tests
        env:
          PUBLIC_API_URL: http://localhost:8080
        run: |
          echo "Running Playwright E2E tests..."
          npx playwright test

      - name: Cleanup docker-compose stack
        if: always()
        run: |
          echo "Cleaning up docker-compose stack..."
          docker compose down -v
          docker compose ps